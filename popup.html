<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Focus Pomodoro</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div>
        <h1>Focus Pomodoro</h1>
        <p id="proBadge" class="badge">Free</p>
      </div>
      <button id="openDashboardBtn" class="ghost">Dashboard</button>
    </header>

    <section class="stats-dashboard">
      <div class="stat-card"><span>Today</span><strong id="sessionsToday">0</strong></div>
      <div class="stat-card"><span>Minutes</span><strong id="focusMinutes">0</strong></div>
      <div class="stat-card"><span id="motivationMsg">Ready</span></div>
    </section>

    <div class="timer" id="timer">25:00</div>
    <div class="controls">
      <button id="startBtn">Start</button>
      <button id="pauseBtn">Pause</button>
      <button id="resetBtn">Reset</button>
    </div>

    <div id="breakSuggestion" class="tip">
      <span id="suggestionText"></span>
    </div>

    <section class="task-section">
      <input type="text" id="taskInput" placeholder="What are you working on?">
      <button id="addTaskBtn">Add</button>
      <ul id="taskList"></ul>
    </section>

    <div class="footer">
      <button id="exportBtn" class="ghost">Export CSV</button>
      <button id="optionsLink" class="ghost">Options</button>
    </div>

    <div id="feedbackPrompt" class="feedback hidden">
      <p>How focused were you? (1-5)</p>
      <div id="ratingButtons"></div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
