<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Focus Pomodoro</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Dashboard -->
    <div class="stats-dashboard">
      <div class="stat-card">
        <span class="stat-label">🍅 Today</span>
        <span class="stat-value" id="sessionsToday">0</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">⏱️ Focus min</span>
        <span class="stat-value" id="focusMinutes">0</span>
      </div>
      <div class="stat-card">
        <span class="stat-label" id="motivationMsg">✨ Ready?</span>
      </div>
    </div>

    <!-- Timer -->
    <div class="timer" id="timer">25:00</div>
    <div class="controls">
      <button id="startBtn">▶ Start</button>
      <button id="pauseBtn">⏸ Pause</button>
      <button id="resetBtn">⟳ Reset</button>
    </div>

    <!-- Break suggestion (hidden until break starts) -->
    <div id="breakSuggestion" style="display:none; background:#2a2a3d; padding:6px; border-radius:8px; margin:8px 0; font-size:12px;">
      💡 <span id="suggestionText"></span>
    </div>

    <!-- Task section -->
    <div class="task-section">
      <input type="text" id="taskInput" placeholder="What are you working on?">
      <button id="addTaskBtn">+ Add</button>
      <ul id="taskList"></ul>
    </div>

    <!-- Footer links -->
    <div style="margin-top: 12px; text-align: center; font-size: 11px;">
      <button id="exportBtn" style="background:none; border:none; color:#66ff99; cursor:pointer;">📥 Export CSV</button>
      <a href="#" id="optionsLink" style="color:#66ff99; margin-left: 8px;">⚙️ Options</a>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
