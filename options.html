<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pomodoro Extension Options</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 24px;
      max-width: 420px;
    }
    .input-group {
      margin-bottom: 18px;
    }
    label {
      display: block;
      margin-bottom: 4px;
    }
    input[type="number"] {
      width: 80px;
      margin-right: 8px;
    }
    #blocked-list {
      margin: 0;
      padding: 0;
      list-style: none;
      max-height: 120px;
      overflow-y: auto;
      margin-bottom: 8px;
    }
    #blocked-list li {
      display: flex;
      align-items: center;
      margin-bottom: 4px;
    }
    #blocked-list button {
      margin-left: 8px;
      background: #e55353;
      color: white;
      border: none;
      border-radius: 3px;
      padding: 2px 8px;
      cursor: pointer;
    }
    #add-blocked {
      margin-left: 6px;
      padding: 2px 8px;
    }
    #save-btn {
      margin-top: 18px;
      padding: 7px 18px;
      background: #4caf50;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 15px;
      cursor: pointer;
    }
    .message {
      margin-top: 14px;
      font-size: 14px;
      color: #248624;
    }
  </style>
</head>
<body>
  <h2>Pomodoro Timer Options</h2>

  <div class="input-group">
    <label for="work-minutes">Work Minutes</label>
    <input type="number" id="work-minutes" min="1" max="180" value="25">
  </div>

  <div class="input-group">
    <label for="break-minutes">Break Minutes</label>
    <input type="number" id="break-minutes" min="1" max="60" value="5">
  </div>

  <div class="input-group">
    <label for="blocked-site">Blocked Websites</label>
    <ul id="blocked-list"></ul>
    <input type="text" id="blocked-site" placeholder="e.g. facebook.com">
    <button id="add-blocked" type="button">Add</button>
  </div>

  <button id="save-btn" type="button">Save</button>
  <div class="message" id="message"></div>

  <script src="options.js"></script>
</body>
</html>
